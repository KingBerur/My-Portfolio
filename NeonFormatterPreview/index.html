<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyrics Formatter | Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #050505;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .exit-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: #ff003c;
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 0 25px rgba(255, 0, 60, 0.5);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .exit-btn:hover {
      background-color: #ff3366;
      box-shadow: 0 0 40px rgba(255, 0, 60, 0.8);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <!-- Load the live external utility inside an iframe -->
  <iframe src="https://citamrongai.github.io/media-operations/index.html"></iframe>

  <!-- Inject the global universal Portfolio Exit Button -->
  <a href="../web-dev/index.html" class="exit-btn">
    <i data-feather="arrow-left"></i> Exit Preview
  </a>

  <script>
    feather.replace();
  </script>
</body>

</html>
